<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d0d">
    <title>🎰 Vibe Check Roulette</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="container">

    <div class="badge">no cap zone</div>

    <button id="sunetBtn" class="sunet-btn" aria-label="Pornește/oprește sunetul" title="Sunet">🔊</button>

    <h1>🎰 VIBE CHECK</h1>

    <div id="slots">
        <div class="slot">7️⃣</div>
        <div class="slot">⭐</div>
        <div class="slot">💎</div>
    </div>

    <div id="categorie">
        Apasă START
    </div>

    <div id="mesaj" aria-live="polite">
        Scanează • Joacă • Distrează-te
    </div>

    <img id="memeImg" class="meme-img" alt="" hidden>

    <button id="startBtn">
        🎲 START
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
