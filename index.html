<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Jackpot QR</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

#card{
    max-width:700px;
}

h1{
    font-size:32px;
    margin-bottom:30px;
}

#text{
    font-size:30px;
    line-height:1.5;
    font-weight:bold;
}

button{
    margin-top:40px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}
</style>

</head>

<body>

<div id="card">

<h1>🎉 Jackpot QR 🎉</h1>

<div id="text"></div>

<button onclick="nou()">Altă provocare</button>

</div>

<script>

const mesaje=[
"😂 Spune un banc în 20 de secunde.",
"🎭 Mimează un animal.",
"🥳 Schimbă locul cu persoana din dreapta.",
"🎤 Cântă primul refren care îți vine în minte.",
"👏 Fă un compliment sincer cuiva.",
"🤣 Imită un profesor timp de 30 de secunde.",
"🎲 Toată lumea bate din palme de 5 ori.",
"🎉 Fă un selfie cu persoana din stânga."
];

function nou(){

const x=Math.floor(Math.random()*mesaje.length);

document.getElementById("text").innerHTML=mesaje[x];

}

nou();

</script>

</body>
</html>
