<!DOCTYPE html><html lang='ro'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Jackpot QR</title><style>body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{width:90%;max-width:700px;background:#1c1c1c;border:2px solid #d4af37;border-radius:20px;padding:30px;text-align:center}h1{color:#d4af37}#msg{font-size:30px;min-height:120px;margin:30px 0}button{background:#d4af37;color:#111;border:0;padding:15px 28px;border-radius:12px;font-size:20px;font-weight:bold;cursor:pointer}</style></head><body><div class='card'><h1>🎰 JACKPOT QR</h1><div id='tip'>Apasă START</div><div id='msg'></div><button onclick='spin()'>🎲 START</button></div><script>let g=[],p=[],j=[];async function load(){try{g=await fetch('glume.json').then(r=>r.json());p=await fetch('provocari.json').then(r=>r.json());j=await fetch('jackpot.json').then(r=>r.json());}catch(e){msg.textContent='Completează fișierele JSON.'}}function rnd(a){return a[Math.floor(Math.random()*a.length)]}async function spin(){msg.textContent='🎰 Se învârte...';await new Promise(r=>setTimeout(r,1500));let x=Math.random(),it;if(x<.1&&j.length){tip.textContent='🎰 JACKPOT';it=rnd(j)}else if(x<.55&&p.length){tip.textContent='🎯 PROVOCARE';it=rnd(p)}else if(g.length){tip.textContent='😂 GLUMĂ';it=rnd(g)}else{msg.textContent='JSON gol';return}msg.textContent=it.text||it}load();</script></body></html>
